<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Meu Meet</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header>iDev</header>

<div id="home">

  <h2>Criar Sala</h2>
  <input type="text" id="roomName" placeholder="Nome da sala" />
  <input type="password" id="roomPassword" placeholder="Senha" />
  <button onclick="createRoom()">Criar</button>

  <hr />

  <h2>Salas Disponíveis</h2>
  <ul id="roomsList"></ul>

</div>

<div id="meeting" style="display:none;">

  <div class="video-container">
    <video id="localVideo" autoplay muted playsinline></video>
    <video id="remoteVideo" autoplay playsinline></video>
  </div>

  <div class="controls">
    <button onclick="toggleCamera()" id="camBtn">Ligar Câmera</button>
    <button onclick="toggleMic()" id="micBtn">Mutar Mic</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
